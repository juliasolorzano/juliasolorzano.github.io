{{ if ne (.Params.tts | default true) false }}
<div class="tts-player" role="region" aria-label="{{ i18n "tts_listen" }}" data-pause="{{ i18n "tts_pause" }}" data-resume="{{ i18n "tts_resume" }}" data-stop="{{ i18n "tts_stop" }}" data-playing="{{ i18n "tts_playing" }}" hidden>
  <button class="tts-player__play" aria-label="{{ i18n "tts_listen" }}" type="button">
    <svg class="tts-player__icon tts-player__icon--play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M8 5v14l11-7z"/>
    </svg>
    <svg class="tts-player__icon tts-player__icon--pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden>
      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
    </svg>
    <span class="tts-player__label">{{ i18n "tts_listen" }}</span>
  </button>
  <button class="tts-player__speed" aria-label="{{ i18n "tts_speed" }}" type="button" hidden>1x</button>
  <button class="tts-player__stop" aria-label="{{ i18n "tts_stop" }}" type="button" hidden>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M6 6h12v12H6z"/>
    </svg>
  </button>
  <div class="tts-player__progress" hidden>
    <div class="tts-player__progress-bar" role="progressbar" aria-label="{{ i18n "tts_playing" }}" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
  </div>
  <div aria-live="polite" class="tts-player__sr-status sr-only"></div>
</div>
{{ end }}
