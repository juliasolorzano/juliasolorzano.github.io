<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="HandheldFriendly" content="True">
  <meta name="MobileOptimized" content="320">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {{ if .Title }}
    <title>{{ site.Title }} | {{ .Title }}</title>
    <meta property="og:title" content="{{ site.Title | htmlEscape }} | {{ .Title | htmlEscape }}" />
  {{ else }}
    <title>{{ site.Title }}</title>
    <meta property="og:title" content="{{ site.Title | htmlEscape }} | {{ site.Title | htmlEscape }}" />
  {{ end }}
  <meta property="og:image" content="/assets/images/touch_icon.png">

  <meta name="description" content="{{ site.Params.description }}">
  <meta name="keywords" content="julia solórzano, design manager, management, web design, design, front-end developer, django, python, css, html, javascript">
  <meta name="author" content="Julia Solórzano">

  <link rel="shortcut icon" href="/assets/images/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/images/touch_icon.png">

  {{ $style := resources.Get "scss/base.scss" | toCSS (dict "targetPath" "assets/stylesheets/base.css") }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">

  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme) {
        document.documentElement.setAttribute('data-theme', theme);
      }
    })();
  </script>

</head>
