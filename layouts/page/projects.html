{{ define "main" }}
<h2 class="title">{{ .Title }}</h2>

<p class="subtitle">A selection of projects I have worked on throughout my career.</p>

<div class="projects-grid">
  {{ range .Params.projects }}
  {{ with .url }}
  <a href="{{ . }}" class="project-card project-card--link">
  {{ else }}
  <div class="project-card">
  {{ end }}
    <h3 class="project-card__name">{{ .name }}</h3>
    <p class="project-card__description">{{ .description }}</p>
  {{ with .url }}
  </a>
  {{ else }}
  </div>
  {{ end }}
  {{ end }}
</div>
{{ end }}
