    # ─── SOBRE MÍ ───────────────────────────────────────────────
    about:
      messages:
        - "Soy especialista en operaciones y sistemas de diseño, vivo en Carolina del Norte. Llevo trabajando en tecnología desde 2002."
        - "Creo design systems, hago crecer equipos y ayudo a las personas a ver lo que no pueden ver por sí solas. He trabajado en gobierno, startups y empresas grandes."
        - "¿Qué te gustaría saber?"
      choices:
