          next: about_outside

    about_bio:
      messages:
        - "Fundé el U.S. Web Design System, hice crecer el equipo de diseño de Login.gov de 4 a 24, coautoricé Lightweight Django (O'Reilly) y enseñé en la Universidad de Georgetown."
        - "También fundé Girl Develop It RDU, que creció hasta más de 2,000 miembros."
        - "Tengo una licenciatura en Bellas Artes de la Universidad de Kansas."
      choices:
