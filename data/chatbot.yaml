en:
  nodes:
    start:
      messages:
        - "Hey! Welcome to my corner of the internet."
        - "I'm Julia — design ops specialist, author, and occasional geology volunteer. What brings you here today?"
      choices:
        - label: "Work experience"
          next: experience
        - label: "Projects I've built"
          next: projects
        - label: "My writing"
          next: blog
        - label: "A bit about me"
          next: about
        - label: "Get in touch"
          next: contact

    # ─── EXPERIENCE ─────────────────────────────────────────────
    experience:
      messages:
        - "I've been working in tech since 2002 — over 20 years across government, startups, and enterprise."
        - "I specialize in design operations and systems: scaling teams, building design systems, and making complex organizations work better."
        - "What aspect of my experience interests you most?"
      choices:
        - label: "Current role at Esri"
          next: exp_esri
        - label: "Government work"
          next: exp_gov
        - label: "Startup experience"
          next: exp_startup
        - label: "Skills & expertise"
          next: skills
        - label: "See my full resume"
          next: resume_link

    exp_esri:
      messages:
        - "I'm currently a Senior Design Operations Specialist at Esri, the global leader in GIS software."
        - "I establish design standards and operational foundations across ArcGIS product lines — building shared Figma components, coordinating cross-team design sessions, and partnering with UX Research to create impact reporting frameworks."
        - "A big part of my work is championing AI tooling adoption: I lead GitHub Copilot trainings so designers can contribute directly to codebases, and evaluate tools like Figma Make and Claude to help teams focus on the hard problems."
      choices:
        - label: "More about my government work"
          next: exp_gov
        - label: "My skills & expertise"
          next: skills
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    exp_gov:
      messages:
        - "Most of my career has been in government — I love the challenge of building products that actually serve people at scale."
        - "Here are a few highlights:"
        - "At Login.gov (GSA), I grew the design team from 4 to 24 — a 600% increase — while maintaining 100% retention. We served millions of people across 300+ federal applications."
        - "At the U.S. Web Design System, I co-founded USWDS, a design system now used by hundreds of government websites and serving millions of users globally."
        - "I also led Federal Web Standards at GSA, working directly with OMB on requirements under the 21st Century IDEA Act."
        - "Want to dig into any of these?"
      choices:
        - label: "Login.gov details"
          next: exp_logingov
        - label: "U.S. Web Design System"
          next: exp_uswds
        - label: "VA API Platform"
          next: exp_va
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    exp_logingov:
      messages:
        - "Login.gov is the U.S. government's shared identity platform — one account to access hundreds of federal services."
        - "I was Supervisory IT Specialist from 2020 to 2024. In that time I:"
        - "Scaled the design team from 4 to 24, drove platform internationalization to 3 new markets, and implemented emerging tech features that improved user success rates by 35%."
        - "I also established a comprehensive design operations framework supporting 5 cross-functional product teams, and developed a user research and testing program that increased feedback collection efficiency by 60%."
      choices:
        - label: "U.S. Web Design System"
          next: exp_uswds
        - label: "My startup experience"
          next: exp_startup
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    exp_uswds:
      messages:
        - "The U.S. Web Design System is a design system co-founded by me in 2015 while at GSA."
        - "It's now used by hundreds of government organizations and serves millions of people globally. We achieved adoption by 100+ organizations within the first year."
        - "I led a team of front-end developers and designers, achieved a 50% reduction in implementation time, and established a scalable governance model for distributed contributions."
      choices:
        - label: "My startup experience"
          next: exp_startup
        - label: "Projects I've built"
          next: projects
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    exp_va:
      messages:
        - "At Ad Hoc from 2018 to 2020, I was Senior UX Designer on the Department of Veterans Affairs API Platform."
        - "I established the human-centered design practice from scratch for the VA's API program, created scalable design and research workflows that increased team efficiency by 40%, and implemented a user research program that reduced implementation errors by 60%."
      choices:
        - label: "My startup experience"
          next: exp_startup
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    exp_startup:
      messages:
        - "My startup experience is mostly at Zapier, where I was Design Team Manager for Core Product from 2017 to 2018."
        - "I scaled the design team by 150% in 3 months, reduced hiring timelines from 56 to 28 days, led a complete visual identity redesign, and shipped the first company-wide design system."
        - "Before that I did consulting and freelance work across various early-stage companies."
      choices:
        - label: "My government work"
          next: exp_gov
        - label: "Skills & expertise"
          next: skills
        - label: "See the full resume"
          next: resume_link
        - label: "Something else"
          next: main_menu

    skills:
      messages:
        - "My skills span three areas:"
        - "Design Leadership: Design systems & operations, user research strategy, service design, accessibility & inclusion, human-AI interaction design."
        - "Technical: Figma, front-end development (HTML, CSS, JavaScript), AI-assisted tools (Figma Make, GitHub Copilot, Claude), information architecture, prototyping."
        - "Business & Operations: Team building & mentorship, AI strategy & governance, agile methodologies, stakeholder management, remote team leadership."
      choices:
        - label: "See the full resume"
          next: resume_link
        - label: "Projects I've built"
          next: projects
        - label: "Something else"
          next: main_menu

    resume_link:
      messages:
        - "You can find my full resume — work history, publications, education, and awards — right here on the site."
      choices:
        - label: "View my resume →"
          next: __link__
          url: /resume/
        - label: "Something else"
          next: main_menu

    # ─── PROJECTS ───────────────────────────────────────────────
    projects:
      messages:
        - "Here's a look at some of the work I'm most proud of:"
      choices:
        - label: "Esri"
          next: proj_esri
        - label: "Login.gov"
          next: proj_logingov
        - label: "VA API Platform"
          next: proj_va
        - label: "Zapier"
          next: proj_zapier
        - label: "U.S. Web Design System"
          next: proj_uswds
        - label: "Lightweight Django (book)"
          next: proj_book

    proj_esri:
      messages:
        - "At Esri, I work in the Creative Lab building shared standards across ArcGIS product lines."
        - "Esri is the global leader in GIS software — their tools are used in everything from emergency response to environmental science."
      choices:
        - label: "Visit Esri →"
          next: __link__
          url: https://www.esri.com
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    proj_logingov:
      messages:
        - "At Login.gov, I grew the design team from 4 to 24 and rethought how millions of people log in to government services."
        - "Login.gov is the shared identity platform for the U.S. government, serving millions across 300+ federal applications."
      choices:
        - label: "Visit Login.gov →"
          next: __link__
          url: https://login.gov
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    proj_va:
      messages:
        - "The VA API Platform project was about building a human-centered design practice from scratch for the Department of Veterans Affairs."
        - "I designed the UX strategy for a large-scale API program, making it easier for developers to build products that serve veterans."
      choices:
        - label: "Visit VA Developer Portal →"
          next: __link__
          url: https://developer.va.gov
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    proj_zapier:
      messages:
        - "At Zapier I scaled the design team by 150%, drove a complete visual identity redesign, and shipped the first company-wide design system."
        - "Zapier is an automation platform that connects thousands of apps — a huge, complex product to wrangle design for."
      choices:
        - label: "Visit Zapier →"
          next: __link__
          url: https://zapier.com
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    proj_uswds:
      messages:
        - "The U.S. Web Design System is something I'm especially proud of — I co-founded it in 2015."
        - "It's a design system used by hundreds of government websites, making federal digital services more consistent and accessible."
      choices:
        - label: "Visit USWDS →"
          next: __link__
          url: https://designsystem.digital.gov
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    proj_book:
      messages:
        - "Lightweight Django is a book I co-authored for O'Reilly Media in 2014."
        - "It shows developers how to build modern web apps by combining Django with client-side frameworks and real-time features. Still a useful read for Django developers!"
      choices:
        - label: "View on O'Reilly →"
          next: __link__
          url: https://www.oreilly.com/library/view/lightweight-django/9781491946275/
        - label: "See more projects"
          next: projects
        - label: "Something else"
          next: main_menu

    # ─── BLOG ───────────────────────────────────────────────────
    blog:
      messages:
        - "I write about design systems, accessibility, web development, GIS, team building, and the occasional personal reflection."
        - "I've published over 100 posts here — what are you most interested in?"
      choices:
        - label: "Design systems & ops"
          next: blog_design
        - label: "Web development"
          next: blog_dev
        - label: "Browse everything"
          next: blog_all

    blog_design:
      messages:
        - "A lot of my writing covers design systems, design operations, and team building — topics I've lived through in detail at Login.gov, Zapier, and Esri."
        - "Some popular posts cover scaling design teams, building governance models, and the operational side of running design at enterprise scale."
      choices:
        - label: "Browse all writing →"
          next: __link__
          url: /writing/
        - label: "Something else"
          next: main_menu

    blog_dev:
      messages:
        - "I write about front-end development, Hugo, CSS architecture, accessibility, and building this very website."
        - "I recently wrote about adding dark mode, text-to-speech, a full test suite, and mobile optimizations — all on this site."
      choices:
        - label: "Browse all writing →"
          next: __link__
          url: /writing/
        - label: "Something else"
          next: main_menu

    blog_all:
      messages:
        - "My full writing archive is organized by year — you can find everything there."
      choices:
        - label: "Browse all writing →"
          next: __link__
          url: /writing/
        - label: "Something else"
          next: main_menu

    # ─── ABOUT ──────────────────────────────────────────────────
    about:
      messages:
        - "I'm a design operations and systems specialist based in North Carolina. I've been working in tech since 2002."
        - "I build design systems, grow teams, and help people see what they can't see on their own. I've worked across government, startups, and enterprise."
        - "What would you like to know more about?"
      choices:
        - label: "Background & bio"
          next: about_bio
        - label: "Speaking & talks"
          next: about_speaking
        - label: "Awards & publications"
          next: about_awards
        - label: "Outside of work"
          next: about_outside

    about_bio:
      messages:
        - "I founded the U.S. Web Design System, grew Login.gov's design team from 4 to 24, co-authored Lightweight Django (O'Reilly), and taught at Georgetown University."
        - "I also founded Girl Develop It RDU, growing it to over 2,000 members."
        - "I have a BFA from the University of Kansas."
      choices:
        - label: "My speaking history"
          next: about_speaking
        - label: "Read more about me →"
          next: __link__
          url: /about/
        - label: "Something else"
          next: main_menu

    about_speaking:
      messages:
        - "I've spoken at conferences and events since 2012 — DjangoCon, PyCon, OSCON, API Days Paris, and more."
        - "My DjangoCon 2023 keynote, \"Django the Dinosaur,\" is one I'm particularly proud of."
        - "Topics range from design systems and APIs to team leadership and the realities of working in government tech."
      choices:
        - label: "See full speaking list →"
          next: __link__
          url: /about/
        - label: "Something else"
          next: main_menu

    about_awards:
      messages:
        - "Some recognition I've received over the years:"
        - "CyberScoop Innovation of the Year (2023), FedHealth IT Innovation Award (2018), Service to the Citizens Award (2021), and an AIGA Kansas City Interactive Design Award (2007)."
        - "I've also published in Digital.gov, the Zapier Blog, and co-authored a book with O'Reilly."
      choices:
        - label: "See all publications →"
          next: __link__
          url: /resume/
        - label: "Something else"
          next: main_menu

    about_outside:
      messages:
        - "Outside of work, I volunteer with the North Carolina Geological Survey — mapping rocks and learning about water resources in the field."
        - "I also run. I have a half marathon coming up in May 2026, and I'm currently training for it."
        - "I have a BFA from the University of Kansas and still think about art more than you'd expect."
      choices:
        - label: "Something else"
          next: main_menu

    # ─── CONTACT ────────────────────────────────────────────────
    contact:
      messages:
        - "I'd love to hear from you! Here's where you can find me:"
      choices:
        - label: "Email me →"
          next: __link__
          url: mailto:hello@juliasolorzano.com
        - label: "LinkedIn →"
          next: __link__
          url: https://linkedin.com/in/juliasolorzano
        - label: "GitHub →"
          next: __link__
          url: https://github.com/juliasolorzano
        - label: "Bluesky →"
          next: __link__
          url: https://bsky.app/profile/juliasolorzano.com
        - label: "Something else"
          next: main_menu

