    about_speaking:
      messages:
        - "He dado charlas en conferencias y eventos desde 2012 — DjangoCon, PyCon, OSCON, API Days París, y más."
        - "El keynote de DjangoCon 2023, \"Django the Dinosaur\", es uno del que estoy especialmente orgullosa."
        - "Los temas van desde design systems y APIs hasta liderazgo de equipos y las realidades de trabajar en tecnología gubernamental."
      choices:
