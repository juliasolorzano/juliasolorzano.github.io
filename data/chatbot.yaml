    main_menu:
      messages:
        - "What else can I help you find?"
      choices:
        - label: "Work experience"
          next: experience
        - label: "Projects I've built"
          next: projects
        - label: "My writing"
          next: blog
        - label: "A bit about me"
          next: about
        - label: "Get in touch"
          next: contact

