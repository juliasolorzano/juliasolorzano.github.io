baseURL = "https://juliasolorzano.com"
title = "Julia Solórzano"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    [languages.en.params]
      description = "Julia Solórzano is a design leader and technologist specializing in GIS, web and mobile development, federated identity, and strategic leadership. With 20+ years in tech, she builds high-performing teams and helps people create seamless digital experiences."
      author = "Julia Solórzano"

  [languages.es]
    languageCode = "es-MX"
    languageName = "Español"
    weight = 2
    [languages.es.params]
      description = "Julia Solórzano es una líder de diseño y tecnóloga especializada en GIS, desarrollo web y móvil, identidad federada y liderazgo estratégico. Con más de 20 años en tecnología, forma equipos de alto rendimiento y ayuda a las personas a crear experiencias digitales fluidas."
      author = "Julia Solórzano"

[params]
  author = "Julia Solórzano"

[permalinks]
  posts = "/blog/:year/:month/:day/:slug/"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "monokai"

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[outputFormats.RSS]
  baseName = "feed"

[taxonomies]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
