    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="55%" stop-color="transparent" />
      <stop offset="100%" stop-color="#7A4E20" stop-opacity="0.14" />
    </radialGradient>
    <filter id="glowBlur" x="-30%" y="-30%" width="160%" height="160%">
