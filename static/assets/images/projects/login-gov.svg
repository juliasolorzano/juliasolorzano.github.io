  <!-- Step 1 — completed -->
  <circle cx="648" cy="770" r="14" fill="#8B5820" fill-opacity="0.85" stroke="#8B5820" stroke-width="1.8" stroke-opacity="0.60" />
  <path d="M 642,770 L 647,776 L 655,762" fill="none" stroke="#F4E4B0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.92" />
  <!-- Step 2 — completed -->
