  <circle cx="876" cy="770" r="18" fill="none" stroke="#C49040" stroke-width="1.5" stroke-opacity="0.35" />
  <circle cx="876" cy="770" r="5" fill="#C49040" fill-opacity="0.70" />
  <!-- Step 5 — remaining -->
  <circle cx="952" cy="770" r="12" fill="none" stroke="#8B5820" stroke-width="1.8" stroke-opacity="0.60" />
  <circle cx="952" cy="770" r="5" fill="#C8A86A" fill-opacity="0.35" />

