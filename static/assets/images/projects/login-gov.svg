  <path d="M 718,770 L 723,776 L 731,762" fill="none" stroke="#F4E4B0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.92" />
  <!-- Step 3 — completed -->
