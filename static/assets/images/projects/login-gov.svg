    <linearGradient id="silSmall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B88A48" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#8A6030" stop-opacity="0.30" />
