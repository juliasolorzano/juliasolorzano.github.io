    <linearGradient id="silRight" x1="100%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#C09050" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#8A5C28" stop-opacity="0.55" />
