    <radialGradient id="bgGrad" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#F4EAD2" />
      <stop offset="55%" stop-color="#EDD9B4" />
      <stop offset="100%" stop-color="#D9C090" />
    </radialGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#F8EDD4" />
      <stop offset="55%" stop-color="#E8C87A" />
      <stop offset="100%" stop-color="#C8983A" />
    </radialGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EBDBB2" />
      <stop offset="45%" stop-color="#D4B06A" />
      <stop offset="100%" stop-color="#B88A3E" />
    </linearGradient>
    <linearGradient id="silLeft" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#C8955A" stop-opacity="0.80" />
      <stop offset="100%" stop-color="#9A6430" stop-opacity="0.60" />
