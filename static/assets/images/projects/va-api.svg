      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0b1d3a"/>
    </radialGradient>
    <linearGradient id="bgLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1d3a"/>
      <stop offset="50%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#2a5494"/>
