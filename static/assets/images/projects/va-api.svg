  <!-- VA text -->
  <text x="400" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">VA</text>
  <!-- Developer Platform subtitle -->
  <text x="400" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="300" fill="rgba(255,255,255,0.85)" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">Developer Platform</text>
